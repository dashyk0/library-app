{% extends "base.html" %}

{% block content %}
<div class="author-form-container">
    <div class="author-form-card">
        <h1 class="form-title">Добавить автора</h1>
        <div class="form-divider"></div>

        <form method="POST">
            <div class="form-group">
                <label class="form-label">Полное имя автора *</label>
                <input type="text" name="full_name" class="form-input" required placeholder="Например: Лев Толстой">
            </div>

            <div class="form-group">
                <label class="form-label">Год рождения</label>
                <input type="number" name="birth_year" class="form-input" placeholder="Например: 1828">
            </div>

            <div class="form-group">
                <label class="form-label">Биография</label>
                <textarea name="biography" class="form-textarea" rows="5" placeholder="Краткая информация об авторе..."></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="save-btn">Сохранить</button>
                <a href="{{ url_for('authors.index') }}" class="cancel-btn">Отмена</a>
            </div>
        </form>
    </div>
</div>

<style>
.author-form-container {
    max-width: 700px;
    margin: 0 auto;
    padding: 40px;
    background: #F3F2EC;
    min-height: calc(100vh - 200px);
}
.author-form-card {
    background: white;
    border-radius: 24px;
    padding: 35px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
.form-title {
    font-family: 'Prata', serif;
    font-size: 32px;
    color: #543831;
    margin-bottom: 20px;
}
.form-divider {
    width: 100%;
    height: 1px;
    background: #e0d4c8;
    margin-bottom: 30px;
}
.form-group {
    margin-bottom: 20px;
}
.form-label {
    display: block;
    font-size: 14px;
    color: #543831;
    margin-bottom: 8px;
    font-weight: 500;
}
.form-input, .form-textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #e0d4c8;
    border-radius: 12px;
    font-size: 14px;
    background: white;
    font-family: inherit;
}
.form-input:focus, .form-textarea:focus {
    outline: none;
    border-color: #543831;
}
.form-textarea {
    resize: vertical;
}
.form-actions {
    display: flex;
    gap: 15px;
    margin-top: 30px;
}
.save-btn {
    flex: 1;
    padding: 12px;
    background: #543831;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
}
.save-btn:hover {
    opacity: 0.9;
}
.cancel-btn {
    flex: 1;
    display: inline-block;
    padding: 12px;
    background: #EFD6C0;
    color: #543731;
    text-decoration: none;
    border-radius: 12px;
    text-align: center;
    transition: background 0.2s;
}
.cancel-btn:hover {
    background: #e0c4a8;
}
</style>
{% endblock %}
