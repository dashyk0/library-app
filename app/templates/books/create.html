{% extends "base.html" %}

{% block content %}
<div class="create-page">
    <div class="create-container">
        <div class="create-card">
            <h1 class="create-title">Добавить новую книгу</h1>
            <div class="create-divider"></div>
            
            <form method="POST" enctype="multipart/form-data">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Название книги *</label>
                        <input type="text" name="title" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Автор *</label>
                        <select name="author_id" class="form-select" required>
                            <option value="">— Выберите автора —</option>
                            {% for author in authors %}
                                <option value="{{ author.id }}">{{ author.full_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">ISBN</label>
                        <input type="text" name="isbn" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Год издания</label>
                        <input type="number" name="publication_year" class="form-input" placeholder="Например: 1868">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Издательство</label>
                    <input type="text" name="publisher" class="form-input">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Жанры</label>
                    <select multiple name="genres" class="form-select" size="4">
                        {% for genre in genres %}
                            <option value="{{ genre.id }}">{{ genre.name }}</option>
                        {% endfor %}
                    </select>
                    <small class="form-hint">Удерживайте Ctrl для выбора нескольких жанров</small>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Описание</label>
                    <textarea name="description" class="form-textarea" rows="5" placeholder="Краткое описание книги..."></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Количество экземпляров</label>
                        <input type="number" name="copies_total" class="form-input" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Обложка</label>
                        <input type="file" name="cover_image" class="form-input" accept="image/jpeg,image/png,image/gif">
                        <small class="form-hint">Поддерживаются форматы: JPG, PNG, GIF. Максимум 16MB</small>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="save-btn">Добавить книгу</button>
                    <a href="{{ url_for('books.index') }}" class="cancel-btn">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
.create-page {
    background: #EDEBE4;
    min-height: calc(100vh - 200px);
    padding: 60px 40px;
}
.create-container {
    max-width: 800px;
    margin: 0 auto;
}
.create-card {
    background: white;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
.create-title {
    font-family: 'Prata', serif;
    font-size: 32px;
    color: #543831;
    margin-bottom: 20px;
}
.create-divider {
    width: 100%;
    height: 1px;
    background: #e0d4c8;
    margin-bottom: 30px;
}
.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
}
.form-group {
    margin-bottom: 20px;
}
.form-label {
    display: block;
    font-size: 14px;
    color: #543831;
    margin-bottom: 8px;
    font-weight: 500;
}
.form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #e0d4c8;
    border-radius: 12px;
    font-size: 14px;
    background: white;
    font-family: inherit;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: #543831;
}
.form-textarea {
    resize: vertical;
}
.form-hint {
    display: block;
    font-size: 11px;
    color: #8b6b5d;
    margin-top: 5px;
}
.form-actions {
    display: flex;
    gap: 15px;
    margin-top: 30px;
}
.save-btn {
    flex: 1;
    padding: 12px;
    background: #543831;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
}
.save-btn:hover {
    opacity: 0.9;
}
.cancel-btn {
    flex: 1;
    display: inline-block;
    padding: 12px;
    background: #EFD6C0;
    color: #543731;
    text-decoration: none;
    border-radius: 12px;
    font-size: 14px;
    text-align: center;
    transition: background 0.2s;
}
.cancel-btn:hover {
    background: #e0c4a8;
}
@media (max-width: 600px) {
    .form-row {
        grid-template-columns: 1fr;
        gap: 0;
    }
    .create-card {
        padding: 24px;
    }
}
</style>
{% endblock %}
